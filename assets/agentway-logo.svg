<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">AgentWay logo</title>
  <desc id="desc">A rounded black square with two diamond shapes followed by the word AgentWay.</desc>
  <rect width="900" height="260" fill="#ffffff"/>
  <rect x="32" y="32" width="164" height="164" rx="40" fill="#17181d"/>
  <g transform="translate(114 114)">
    <rect x="-26" y="-26" width="52" height="52" transform="rotate(45)" fill="#ffffff"/>
    <rect x="10" y="-26" width="34" height="34" transform="rotate(45)" fill="#b9bbc3"/>
  </g>
  <text x="245" y="150" fill="#17181d" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="700">AgentWay</text>
</svg>
